<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>霓虹贪吃蛇 - Neon Snake</title>
    <style>
        body {
            background-color: #0a0a0a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #00f2ff;
            font-family: 'Segoe UI', sans-serif;
        }
        canvas {
            border: 5px solid #1a1a1a;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
            background-color: #000;
        }
        .stats {
            margin-bottom: 10px;
            font-size: 24px;
            text-shadow: 0 0 10px #00f2ff;
        }
        .controls {
            margin-top: 15px;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="stats">分数: <span id="score">0</span></div>
    <canvas id="snakeGame" width="400" height="400"></canvas>
    <div class="controls">使用键盘 [ ↑ ↓ ← → ] 控制移动</div>

    <script>
        const canvas = document.getElementById("snakeGame");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");

        const box = 20; // 格子大小
        let snake = [{ x: 10 * box, y: 10 * box }]; // 初始蛇身
        let food = {
            x: Math.floor(Math.random() * 19 + 1) * box,
            y: Math.floor(Math.random() * 19 + 1) * box
        };
        let score = 0;
        let d; // 方向

        // 监听按键
        document.addEventListener("keydown", direction);

        function direction(event) {
            let key = event.keyCode;
            if(key == 37 && d != "RIGHT") d = "LEFT";
            else if(key == 38 && d != "DOWN") d = "UP";
            else if(key == 39 && d != "LEFT") d = "RIGHT";
            else if(key == 40 && d != "UP") d = "DOWN";
        }

        // 碰撞检测
        function collision(head, array) {
            for(let i = 0; i < array.length; i++) {
                if(head.x == array[i].x && head.y == array[i].y) return true;
            }
            return false;
        }

        // 绘制游戏
        function draw() {
            // 背景
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制蛇
            for(let i = 0; i < snake.length; i++) {
                ctx.fillStyle = (i == 0) ? "#00f2ff" : "#006666";
                ctx.shadowBlur = 15;
                ctx.shadowColor = "#00f2ff";
                ctx.fillRect(snake[i].x, snake[i].y, box, box);
                ctx.shadowBlur = 0; // 重置阴影，防止性能下降
            }

            // 绘制食物
            ctx.fillStyle = "#ff007b";
            ctx.shadowBlur = 20;
            ctx.shadowColor = "#ff007b";
            ctx.beginPath();
            ctx.arc(food.x + box/2, food.y + box/2, box/2 - 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            // 获取旧蛇头位置
            let snakeX = snake[0].x;
            let snakeY = snake[0].y;

            // 移动方向
            if( d == "LEFT") snakeX -= box;
            if( d == "UP") snakeY -= box;
            if( d == "RIGHT") snakeX += box;
            if( d == "DOWN") snakeY += box;

            // 如果蛇吃到了食物
            if(snakeX == food.x && snakeY == food.y) {
                score++;
                scoreElement.innerHTML = score;
                food = {
                    x: Math.floor(Math.random() * 19 + 1) * box,
                    y: Math.floor(Math.random() * 19 + 1) * box
                };
            } else {
                // 移除蛇尾
                snake.pop();
            }

            // 新蛇头
            let newHead = { x: snakeX, y: snakeY };

            // 死亡判定 (撞墙或撞到自己)
            if(snakeX < 0 || snakeX >= canvas.width || snakeY < 0 || snakeY >= canvas.height || collision(newHead, snake)) {
                clearInterval(game);
                alert("游戏结束！你的分数是: " + score);
                location.reload(); // 重新加载
            }

            snake.unshift(newHead);
        }

        // 每 100 毫秒刷新一次 (速度控制)
        let game = setInterval(draw, 100);
    </script>
</body>
</html>
